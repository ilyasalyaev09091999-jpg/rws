<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Карта портов</title>
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: row;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }

        #map {
            flex: 4;
            height: 100vh;
        }

        #sidebar {
            flex: 1;
            min-width: 300px;
            background: #fff; /* белая форма */
            border-left: 1px solid #ccc;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            box-shadow: -3px 0 8px rgba(0,0,0,0.05); /* лёгкая тень */
            display: flex;
            flex-direction: column;
        }

        #sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px 10px 10px 10px;
            margin-bottom: 15px;
        }

        legend {
            font-weight: bold;
            color: #555;
            padding: 0 5px;
        }

        .field-block {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        label {
            font-size: 14px;
            color: #555;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="number"],
        input[type="datetime-local"] {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        #calculateBtn {
            background-color: #007bff;
            color: #fff;
            margin-right: 10px;
        }

        #calculateBtn:hover {
            background-color: #0056b3;
        }

        #clearPoints {
            background-color: #6c757d;
            color: #fff;
            margin-top: 8px;
        }

        #clearPoints:hover {
            background-color: #5a6268;
        }

        #routeResult {
            margin-top: 15px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 6px;
            min-height: 40px;
            color: #333;
            font-size: 14px;
        }

    </style>

</head>
<body>
<div id="map"></div>
<div id="sidebar">
    <h2>Расчёт маршрута</h2>

    <form id="routeForm">
        <fieldset>
            <legend>Координата A</legend>
            <div class="field-block">
                <label>Долгота:
                    <input id="startLon" type="text" />
                </label>
            </div>
            <div class="field-block">
                <label>Широта:
                    <input id="startLat" type="text" />
                </label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Координата B</legend>
            <div class="field-block">
                <label>Долгота:
                    <input id="endLon" type="text" />
                </label>
            </div>
            <div class="field-block">
                <label>Широта:
                    <input id="endLat" type="text" />
                </label>
            </div>
        </fieldset>

        <div class="field-block">
            <label>Время отправления:
                <input type="datetime-local" id="departureTime" />
            </label>
        </div>

        <div class="field-block">
            <label>Скорость (км/ч):
                <input type="number" id="speed" min="1" value="12" />
            </label>
        </div>

        <div class="field-block">
            <button type="submit" id="calculateBtn">Рассчитать маршрут</button>
            <button id="clearPoints" type="button" style="margin-top: 8px;">
                Очистить точки
            </button>
        </div>

        <div id="progressContainer" style="display:none; margin-top:10px;">
            <div id="progressBar" style="
        width:0%;
        height:8px;
        background-color:#007bff;
        border-radius:4px;
        transition: width 0.3s;
    "></div>
        </div>
        <div id="routeResult"></div>
    </form>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="main.js"></script>
</body>
</html>
