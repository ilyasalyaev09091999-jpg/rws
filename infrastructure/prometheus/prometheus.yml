global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: geography-postgres
    static_configs:
      - targets: ["geography-postgres-exporter:9187"]

  - job_name: refdata-postgres
    static_configs:
      - targets: ["refdata-postgres-exporter:9187"]

  - job_name: archive-postgres
    static_configs:
      - targets: ["archive-postgres-exporter:9187"]

  # Сервисы в docker
  - job_name: refdata-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["refdata-api:8082"]

  - job_name: route-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["route-api:8080"]

  - job_name: rws-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["rws-api:8083"]

  - job_name: archive-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["archive-api:8084"]

  - job_name: geography-importer
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["geography-importer:8081"]
