syntax = "proto3";

package refdata;

option java_multiple_files = true;
option java_package = "com.refdata.grpc";
option java_outer_classname = "RefDataProto";

// =======================
// Service
// =======================

service LockService {
    rpc GetAllLocksForRws(Empty) returns (LockListForRws);

    rpc GetAllLocksForRoute(Empty) returns (LockListForRoute);
}

service PortService {
    rpc GetAllPortsForRws(Empty) returns (PortListForRws);

    rpc GetAllPortsForRoute(Empty) returns (PortListForRoute);
}

// =======================
// Common
// =======================

message Empty {}

// =======================
// LockForRws
// =======================

message LockForRws {

  // Уникальный идентификатор шлюза
  string id = 1;

  // Название шлюза
  string name = 2;

  // Географические координаты
  double latitude = 3;
  double longitude = 4;
}

message LockListForRws {
  repeated LockForRws locks = 1;
}

// =======================
// LockForRoute
// =======================

message LockForRoute {
  string name = 1;
  repeated int64 nodeIds = 2;
}

message LockListForRoute {
  repeated LockForRoute locks = 1;
}

// =======================
// PortForRws
// =======================

message PortForRws {

  // Уникальный идентификатор порта
  string id = 1;

  // Название
  string name = 2;

  // Географические координаты
  double latitude = 3;
  double longitude = 4;
}

message PortListForRws {
  repeated PortForRws ports = 1;
}


// =======================
// PortForRoute
// =======================

message PortForRoute {
  // Географические координаты
  double latitude = 3;
  double longitude = 4;
}

message PortListForRoute {
  repeated PortForRoute ports = 1;
}
