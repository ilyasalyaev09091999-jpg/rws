services:
  redis:
    image: redis:7.0
    container_name: redis-route
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis

  geography-postgres:
    image: pgrouting/pgrouting:16-3.5-4.0
    container_name: geography-postgres
    environment:
      POSTGRES_USER: geography
      POSTGRES_PASSWORD: geography
      POSTGRES_DB: geography
    volumes:
      - ./infrastructure/databases/geography:/docker-entrypoint-initdb.d:ro
      - cd24b5a5e36c902ce74decce9776ee144b05b72595d33e217c58a49449a02d1c:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U geography -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 20

  geography-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: geography-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://geography:geography@geography-postgres:5432/geography?sslmode=disable"
    depends_on:
      - geography-postgres

  geography-importer:
    build: ./geography-importer
    container_name: geography-importer
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://geography-postgres:5432/geography
      SPRING_DATASOURCE_USERNAME: geography
      SPRING_DATASOURCE_PASSWORD: geography
    depends_on:
      - geography-postgres
      - redis

  refdata-postgres:
    image: postgres:16
    container_name: refdata-postgres
    environment:
      POSTGRES_USER: refdata
      POSTGRES_PASSWORD: refdata
      POSTGRES_DB: refdata
    volumes:
      - ./infrastructure/databases/refdata:/docker-entrypoint-initdb.d:ro
      - d11928472a7d52d2765187b85dac43abe25a6cf8ab94d7b47d148eba5378adc8:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U refdata -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 20

  refdata-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: refdata-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://refdata:refdata@refdata-postgres:5432/refdata?sslmode=disable"
    depends_on:
      - refdata-postgres

  archive-postgres:
    image: postgres:16
    container_name: archive-postgres
    environment:
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive
      POSTGRES_DB: archive
    volumes:
      - ./infrastructure/databases/archive:/docker-entrypoint-initdb.d:ro
      - archive_postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U archive -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 20

  archive-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: archive-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://archive:archive@archive-postgres:5432/archive?sslmode=disable"
    depends_on:
      - archive-postgres

  refdata-api:
    build:
      context: .
      dockerfile: refdata-api/Dockerfile
    container_name: refdata-api
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://refdata-postgres:5432/refdata
      SPRING_DATASOURCE_USERNAME: refdata
      SPRING_DATASOURCE_PASSWORD: refdata
      OTEL_SERVICE_NAME: refdata-api
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_TIMEOUT: 30000
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      - refdata-postgres
      - redis
      - tempo

  route-api:
    build:
      context: .
      dockerfile: route-api/Dockerfile
    container_name: route-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://geography-postgres:5432/geography
      SPRING_DATASOURCE_USERNAME: geography
      SPRING_DATASOURCE_PASSWORD: geography
      SPRING_REDIS_HOST: redis-route
      SPRING_REDIS_PORT: 6379
      GRPC_REF_DATA_ADDRESS: dns:///refdata-api:8092
      OTEL_SERVICE_NAME: route-api
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_TIMEOUT: 30000
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      - geography-postgres
      - redis
      - refdata-api
      - tempo

  rws-api:
    build:
      context: .
      dockerfile: rws-api/Dockerfile
    container_name: rws-api
    ports:
      - "8083:8083"
    environment:
      GRPC_REF_DATA_ADDRESS: dns:///refdata-api:8092
      GRPC_ROUTE_ADDRESS: dns:///route-api:8090
      GRPC_ARCHIVE_ADDRESS: dns:///archive-api:8094
      OTEL_SERVICE_NAME: rws-api
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_TIMEOUT: 30000
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      - route-api
      - refdata-api
      - archive-api
      - tempo

  archive-api:
    build:
      context: .
      dockerfile: archive-api/Dockerfile
    container_name: archive-api
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://archive-postgres:5432/archive
      SPRING_DATASOURCE_USERNAME: archive
      SPRING_DATASOURCE_PASSWORD: archive
      OTEL_SERVICE_NAME: archive-api
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://tempo:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_TIMEOUT: 30000
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
    depends_on:
      - archive-postgres
      - redis
      - tempo

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infrastructure/loki/promtail.yml:/etc/promtail/promtail.yml
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infrastructure/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # HTTP
      - "4317:4317"   # OTLP gRPC
    restart: unless-stopped


volumes:
  cd24b5a5e36c902ce74decce9776ee144b05b72595d33e217c58a49449a02d1c:
    external: true
  d11928472a7d52d2765187b85dac43abe25a6cf8ab94d7b47d148eba5378adc8:
    external: true
  archive_postgres_data:
  redis_data:
  grafana_data:
  tempo_data:




