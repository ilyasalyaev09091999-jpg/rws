server:
  port: 8080

grpc:
  server:
    port: 8090

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/geography}
    username: ${SPRING_DATASOURCE_USERNAME:geography}
    password: ${SPRING_DATASOURCE_PASSWORD:geography}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis-route}
      port: ${SPRING_REDIS_PORT:6379}

    cache:
      type: redis


management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: prometheus,health
  metrics:
    export:
      prometheus:
        enabled: true