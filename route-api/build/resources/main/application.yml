spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/geography
    username: geography
    password: geography
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  redis:
    host: localhost
    port: 6379

  cache:
    type: redis

logging:
  level:
    org.springframework.cache: DEBUG
