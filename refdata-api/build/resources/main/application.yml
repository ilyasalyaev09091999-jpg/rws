server:
  port: 8082

grpc:
  server:
    port: 8092

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/refdata}
    username: ${SPRING_DATASOURCE_USERNAME:refdata}
    password: ${SPRING_DATASOURCE_PASSWORD:refdata}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: prometheus,health
  metrics:
    export:
      prometheus:
        enabled: true