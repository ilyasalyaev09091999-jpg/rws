server.port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/geography
    username: geography
    password: geography
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration