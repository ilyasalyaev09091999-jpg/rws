server.port: 8091

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/geography}
    username: ${SPRING_DATASOURCE_USERNAME:geography}
    password: ${SPRING_DATASOURCE_PASSWORD:geography}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: prometheus,health
  metrics:
    export:
      prometheus:
        enabled: true